services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pawonos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pawonos}
      POSTGRES_USER: ${POSTGRES_USER:-pawonos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pawonos} -d ${POSTGRES_DB:-pawonos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pawonos

  # API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: pawonos-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pawonos}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pawonos}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pawonos

  # Web Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: pawonos-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - pawonos

  # Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    container_name: pawonos-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile.prod:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api
    networks:
      - pawonos

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  pawonos:
    driver: bridge