services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pawonos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pawonos
      POSTGRES_USER: pawonos
      POSTGRES_PASSWORD: pawonos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawonos -d pawonos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: pawonos-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: pawonos
      MINIO_ROOT_PASSWORD: pawonos123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Caddy Reverse Proxy
  caddy:
    image: caddy:2-alpine
    container_name: pawonos-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  # Redis (future)
  # redis:
  #   image: redis:7-alpine
  #   container_name: pawonos-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
  # redis_data: